<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nwabuisi Isaac | Portfolio</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { text-align: center; max-width: 400px; width: 90%; }
        img { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            border: 3px solid #38bdf8; 
            margin-bottom: 20px; 
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #94a3b8; margin-bottom: 20px; }
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .skill-badge {
            background: #1e293b;
            color: #38bdf8;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #334155;
        }
        .link { 
            display: block; 
            background: #1e293b; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 12px; 
            text-decoration: none; 
            color: white; 
            font-weight: 600; 
            border: 1px solid #334155; 
            transition: 0.3s; 
        }
        .link:hover { 
            background: #38bdf8; 
            color: #0f172a; 
            transform: translateY(-3px); 
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/isaacnkwa0-rgb.png" alt="Nwabuisi Isaac">
        <h1>Nwabuisi Isaac</h1>
        <p>Full-Stack Developer in Training 🚀</p>

        <div class="skills-container">
            <div class="skill-badge">Node.js</div>
            <div class="skill-badge">PHP</div>
            <div class="skill-badge">Supabase</div>
            <div class="skill-badge">Laravel</div>
            <div class="skill-badge">Full-Stack</div>
        </div>
        
        <a href="https://github.com/isaacnkwa0-rgb" class="link">My GitHub</a>
        <a href="#" class="link">Inventory App (In Progress)</a>
        <a href="mailto:isaacnkwa0@gmail.com" class="link">Contact Me</a>
    </div>
</body>
</html>
